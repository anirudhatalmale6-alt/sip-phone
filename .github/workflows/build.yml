name: Build Windows EXE

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyVoIP==1.6.8 pyinstaller==6.11.1

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "SIP-Phone" --icon NONE sip_phone.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SIP-Phone-Windows
          path: dist/SIP-Phone.exe
