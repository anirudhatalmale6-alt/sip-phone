<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>התקשר אלינו</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #1a1a2e;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.card {
    background: #16213e;
    border-radius: 16px;
    padding: 40px;
    width: 350px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
h1 {
    color: #e94560;
    font-size: 26px;
    margin-bottom: 10px;
}
.number {
    font-size: 28px;
    color: #fff;
    margin: 20px 0;
    direction: ltr;
    letter-spacing: 2px;
}
.btn-call {
    display: inline-block;
    background: #4CAF50;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 22px;
    font-weight: bold;
    padding: 18px 50px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.1s;
}
.btn-call:hover {
    background: #388E3C;
    transform: scale(1.05);
}
.btn-call:active {
    transform: scale(0.98);
}
.btn-hangup {
    display: inline-block;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 22px;
    font-weight: bold;
    padding: 18px 50px;
    cursor: pointer;
    text-decoration: none;
    margin-top: 15px;
    transition: background 0.2s, transform 0.1s;
}
.btn-hangup:hover {
    background: #c62828;
    transform: scale(1.05);
}
.btn-hangup:active {
    transform: scale(0.98);
}
.status {
    margin-top: 15px;
    font-size: 14px;
    color: #4CAF50;
    min-height: 20px;
}
.note {
    margin-top: 10px;
    font-size: 13px;
    color: #777;
}
</style>
</head>
<body>
<div class="card">
    <h1>התקשר אלינו</h1>
    <div class="number">0527172458</div>
    <button class="btn-call" onclick="dialNumber()">📞 חייג עכשיו</button>
    <br>
    <button class="btn-hangup" onclick="hangupCall()">📕 נתק שיחה</button>
    <div class="status" id="status"></div>
    <div class="note">סגירת הדף מנתקת את השיחה אוטומטית</div>
</div>

<script>
var KEEPALIVE_URL = 'http://127.0.0.1:48080';
var pingInterval = null;
var statusEl = document.getElementById('status');

function dialNumber() {
    statusEl.textContent = 'מחייג...';
    window.location.href = 'sipphone://0527172458';

    // Start keepalive pings after a short delay (let app start)
    setTimeout(function() {
        startKeepalive();
        statusEl.textContent = 'שיחה פעילה - אל תסגור דף זה';
    }, 2000);
}

function hangupCall() {
    stopKeepalive();
    // Try HTTP hangup first (more reliable)
    fetch(KEEPALIVE_URL + '/hangup').catch(function(){});
    // Also try protocol handler as fallback
    setTimeout(function() {
        window.location.href = 'sipphone://hangup';
    }, 200);
    statusEl.textContent = 'השיחה נותקה';
}

function startKeepalive() {
    stopKeepalive();
    pingInterval = setInterval(function() {
        fetch(KEEPALIVE_URL + '/ping').catch(function(){});
    }, 1000);
}

function stopKeepalive() {
    if (pingInterval) {
        clearInterval(pingInterval);
        pingInterval = null;
    }
}

// Stop keepalive when page closes -> triggers auto-hangup
window.addEventListener('beforeunload', function() {
    stopKeepalive();
});
</script>
</body>
</html>
